<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion/Inscription</title>
  <link href="connexion.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div class="logo-container">
        <a href="../index.html" class="logo">Ecoride</a>
  </div>
  <div class="container">

    <div class="form-box login">
      <h2>Connexion</h2>
      <form>
        <div class="input-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" required>
        </div>
        <div class="input-group">
          <label for="loginPassword">Mot de passe</label>
          <input type="password" id="loginPassword" required>
        </div>
        <button type="submit">Se Connecter</button>
        <p>Pas de compte ? <a href="#" class="switch-form" data-target="register">Inscrivez-vous</a></p>
      </form>
    </div>

    <div class="form-box register">
      <h2>Inscription</h2>
      <form>
        <div class="input-group">
          <label for="registerName">Nom</label>
          <input type="text" id="registerName" required>
        </div>
        <div class="input-group">
          <label for="registerEmail">Email</label>
          <input type="email" id="registerEmail" required>
        </div>
        <div class="input-group">
          <label for="registerPassword">Mot de passe</label>
          <input type="password" id="registerPassword" required>
        </div>
        <button type="submit">S'inscrire</button>
        <p>Déjà un compte ? <a href="#" class="switch-form" data-target="login">Connectez-vous</a></p>
      </form>
    </div>

  </div>

  <script src="connexion.js"></script>
</body>

</html>
